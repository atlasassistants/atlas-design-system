<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Atlas — Gradients</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; display: grid; grid-template-columns: 1.1fr 1fr 1fr; gap: 14px; }
  .card { border: 1px solid var(--border-soft); border-radius: var(--r-xl); padding: 18px; background: var(--surface); display: flex; flex-direction: column; gap: 10px; }
  .swatch { height: 56px; border-radius: 8px; }
  .name { font-size: 12px; font-weight: 500; color: var(--fg-1); }
  .lbl { font-size: 10px; color: var(--fg-3); font-family: var(--font-mono); line-height: 1.5; }
  .text { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
</style>
</head>
<body>
  <div class="card">
    <div class="swatch" style="background: var(--gradient-brand)"></div>
    <span class="name">--gradient-brand</span>
    <span class="lbl">135° · #5c70ff → #b675f5<br/>logo, primary fills</span>
  </div>
  <div class="card">
    <div class="text grad-text">zone of genius</div>
    <span class="name">--gradient-text</span>
    <span class="lbl">#fff → #d6c8ff → #ba9cff</span>
  </div>
  <div class="card">
    <div class="text grad-text-soft">Atlas</div>
    <span class="name">--gradient-text-soft</span>
    <span class="lbl">#fff 30% → #ba9cff</span>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Atlas — Accent</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: var(--r-md); aspect-ratio: 1.6 / 1; border: 1px solid var(--border-soft); }
  .name { font-size: 12px; color: var(--fg-1); font-weight: 500; display: block; margin-top: 8px; }
  .lbl { font-size: 11px; color: var(--fg-3); margin-top: 4px; font-family: var(--font-mono); display: block; }
</style>
</head>
<body>
  <div><div class="sw" style="background:#ba9cff"></div><span class="name">lavender · accent</span><span class="lbl">#ba9cff</span></div>
  <div><div class="sw" style="background:#9382ff"></div><span class="name">indigo · info</span><span class="lbl">#9382ff</span></div>
  <div><div class="sw" style="background:#5c70ff"></div><span class="name">periwinkle · grad start</span><span class="lbl">#5c70ff</span></div>
  <div><div class="sw" style="background:#b675f5"></div><span class="name">magenta · grad end</span><span class="lbl">#b675f5</span></div>
</body>
</html>

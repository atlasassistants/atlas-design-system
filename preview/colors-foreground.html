<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Atlas — Foreground</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-2); display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .row { border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: 14px; background: var(--surface); }
  .swatch { width: 100%; height: 28px; border-radius: 4px; margin-bottom: 8px; }
  .name { font-size: 12px; font-weight: 500; }
  .lbl { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); display: block; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row"><div class="swatch" style="background:#ffffff"></div><span class="name" style="color:var(--fg-1)">fg-1 · primary</span><span class="lbl">#fff · 100%</span></div>
  <div class="row"><div class="swatch" style="background:rgba(255,255,255,0.72)"></div><span class="name" style="color:var(--fg-2)">fg-2 · body</span><span class="lbl">white · 72%</span></div>
  <div class="row"><div class="swatch" style="background:rgba(255,255,255,0.50)"></div><span class="name" style="color:var(--fg-3)">fg-3 · muted</span><span class="lbl">white · 50%</span></div>
  <div class="row"><div class="swatch" style="background:rgba(255,255,255,0.32)"></div><span class="name" style="color:var(--fg-4)">fg-4 · hint</span><span class="lbl">white · 32%</span></div>
</body>
</html>

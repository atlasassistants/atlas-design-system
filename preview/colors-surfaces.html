<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Atlas — Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { border-radius: var(--r-md); aspect-ratio: 1.4 / 1; border: 1px solid var(--border-soft); position: relative; }
  .lbl { font-size: 11px; color: var(--fg-3); margin-top: 8px; font-family: var(--font-mono); display: block; }
  .name { font-size: 12px; color: var(--fg-1); font-weight: 500; display: block; margin-top: 4px; }
</style>
</head>
<body>
  <div><div class="sw" style="background:#050314"></div><span class="name">bg</span><span class="lbl">#050314</span></div>
  <div><div class="sw" style="background:#0a0620"></div><span class="name">bg-2</span><span class="lbl">#0a0620</span></div>
  <div><div class="sw" style="background:#110a2c"></div><span class="name">surface</span><span class="lbl">#110a2c</span></div>
  <div><div class="sw" style="background:#1a1140"></div><span class="name">surface-2</span><span class="lbl">#1a1140</span></div>
  <div><div class="sw" style="background:#1d1640"></div><span class="name">border-soft</span><span class="lbl">#1d1640</span></div>
  <div><div class="sw" style="background:#2a1f55"></div><span class="name">border</span><span class="lbl">#2a1f55</span></div>
</body>
</html>

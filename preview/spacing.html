<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Atlas — Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; }
  .row { display: grid; grid-template-columns: 56px 1fr 80px; align-items: center; gap: 14px; padding: 6px 0; }
  .bar { height: 14px; background: var(--gradient-brand); border-radius: 4px; }
  .name { font-size: 12px; font-weight: 500; }
  .val { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); text-align: right; }
</style>
</head>
<body>
  <div class="row"><span class="name">space-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="name">space-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="name">space-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="name">space-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="name">space-6</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
  <div class="row"><span class="name">space-8</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="name">space-12</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
  <div class="row"><span class="name">space-20</span><div class="bar" style="width:80px"></div><span class="val">80px</span></div>
  <div class="row"><span class="name">space-30</span><div class="bar" style="width:120px"></div><span class="val">120px</span></div>
</body>
</html>

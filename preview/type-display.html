<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Atlas — Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px 32px; }
  .row { margin-bottom: 18px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); display:block; margin-top: 6px; }
  .display1 { font-size: 64px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.05; }
  .h2 { font-size: 40px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.2; }
  .h3 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.2; }
</style>
</head>
<body>
  <div class="row"><div class="display1 grad-text">Operate in your zone of genius.</div><span class="meta">H1 · 64px / 700 · -0.03em · gradient-text</span></div>
  <div class="row"><div class="h2">Matched in two weeks.</div><span class="meta">H2 · 40px / 700 · -0.025em</span></div>
  <div class="row"><div class="h3">Your EA, with 10x reach.</div><span class="meta">H3 · 22px / 600 · -0.01em</span></div>
</body>
</html>

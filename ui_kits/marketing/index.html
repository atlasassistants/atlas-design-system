<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atlas Assistants — Marketing UI Kit</title>
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
<link rel="stylesheet" href="https://fonts.bunny.net/css?family=inter:400,500,600,700&display=swap" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="kit.css" />
</head>
<body>
<div id="root"></div>
<div class="stars"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Brand.jsx"></script>
<script type="text/babel" src="NavBar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="LogoBar.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="FeatureSplits.jsx"></script>
<script type="text/babel" src="Stats.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="FAQ.jsx"></script>
<script type="text/babel" src="CTAFooter.jsx"></script>

<script type="text/babel" data-presets="react">
  const App = () => {
    const [active, setActive] = React.useState("services");
    const [toast, setToast] = React.useState(null);

    const scrollTo = (id) => {
      setActive(id);
      const el = document.getElementById(id === "cta" ? "pricing" : id);
      if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: "smooth" });
    };

    const showToast = (msg) => {
      setToast(msg);
      setTimeout(() => setToast(null), 2400);
    };

    const onBook = () => showToast("Discovery call requested — we'll be in touch within 1 business day.");

    return (
      <React.Fragment>
        <NavBar active={active} onNav={scrollTo} />
        <Hero onPrimary={onBook} onSecondary={() => scrollTo("services")} />
        <LogoBar />
        <Services />
        <FeatureEAMatch />
        <FeatureAIOperator />
        <Stats />
        <Testimonials />
        <Pricing onBook={onBook} />
        <FAQ />
        <CTABlock onPrimary={onBook} />
        <Footer />
        {toast && (
          <div style={{
            position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
            background: "var(--surface)", border: "1px solid var(--accent-border)",
            color: "var(--fg-1)", padding: "12px 20px", borderRadius: 999,
            boxShadow: "0 12px 40px rgba(186,156,255,0.20), inset 0 1px 0 rgba(255,255,255,0.06)",
            fontSize: 14, fontWeight: 500, zIndex: 200,
          }}>{toast}</div>
        )}
      </React.Fragment>
    );
  };

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
